  services:
    app:
      build:
        context: .
        dockerfile: Dockerfile.dev
      container_name: app-cmf-dev
      ports:
        - "3000:3000"
      env_file:
        - .env
      environment:
        WATCHPACK_POLLING: "true"
        CHOKIDAR_USEPOLLING: "true"
        CHOKIDAR_INTERVAL: "100"
      volumes:
        - .:/app
        - /app/node_modules
        - /app/.next
      command: yarn dev --webpack -H 0.0.0.0
